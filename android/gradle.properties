# Increased memory for heavy AI and Reel processing
org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=1024m -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# AndroidX and Jetifier for modern plugin support
android.useAndroidX=true
android.enableJetifier=true

# Optimization for CI/CD (GitHub Actions)
org.gradle.daemon=false
kotlin.incremental=false
org.gradle.parallel=true
org.gradle.caching=true