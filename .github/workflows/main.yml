name: Build Professional Reelzo APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_android:
    name: Android Build Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Fetch Source Code
        uses: actions/checkout@v4

      - name: Configure Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Configure Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Repair and Get Dependencies
        run: |
          flutter pub get
          flutter pub upgrade --major-versions --confirm

      - name: Execute Production Build
        run: |
          flutter build apk --release \
          --no-pub \
          --dart-define=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
          --dart-define=AGORA_APP_ID=${{ secrets.AGORA_APP_ID }}

      - name: Archive Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Reelzo-Production-Build
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
