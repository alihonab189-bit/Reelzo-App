name: reelzo
description: Reelzo Super App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # --- UI, ICONS & ANIMATIONS ---
  cupertino_icons: ^1.0.6
  confetti: ^0.7.0          
  vibration: ^3.1.8         # 🔥 Updated to fix conflict with share_plus

  # --- FIREBASE & AUTHENTICATION ---
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  firebase_auth: ^6.4.0
  google_sign_in: ^7.2.0
  firebase_storage: ^13.3.0
  firebase_messaging: ^16.2.0

  # --- VIDEO & CAMERA ---
  video_player: ^2.8.5
  video_compress: ^3.1.2
  camera: ^0.12.0+1
  image_picker: ^1.1.1
  gal: ^2.1.1

  # --- AUDIO, VOICE & STORAGE ---
  audioplayers: ^6.6.0      
  flutter_tts: ^4.2.5       
  speech_to_text: ^7.3.0
  shared_preferences: ^2.3.2 

  # --- NETWORKING & UTILS ---
  http: ^1.2.1
  share_plus: ^13.0.0
  url_launcher: ^6.2.5
  permission_handler: ^12.0.1
  razorpay_flutter: ^1.3.6
  intl: ^0.19.0             # 🔥 Added for Date & Currency formatting in History

  # --- CALL & COMMUNICATION ---
  agora_rtc_engine: ^6.3.0

  # --- NOTIFICATIONS ---
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_image_compress: ^2.0.0

# --- APP ICON CONFIGURATION ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"

# --- FLUTTER ASSETS ---
flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/sounds/payment_success.mp3